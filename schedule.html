<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule a Session — Self Tape Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f7f4ef;
      --ink: #1a1714;
      --muted: #7a7470;
      --accent: #b5863a;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.5;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      border-bottom: 0.5px solid rgba(26,23,20,0.12);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 1px;
    }

    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--ink); }

    .page-header {
      text-align: center;
      padding: 3.5rem 2rem 1.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.1s;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 1.5rem;
    }

    .eyebrow span {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .eyebrow-line {
      width: 32px;
      height: 0.5px;
      background: var(--muted);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 60px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 3px;
      color: var(--ink);
      margin-bottom: 0.75rem;
    }

    .subhead {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      margin: 1.5rem auto 0;
    }

    .calendly-wrap {
      flex: 1;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.35s;
    }

    .calendly-inline-widget {
      min-width: 320px;
      height: 700px;
      border-radius: 4px;
      overflow: hidden;
    }

    footer {
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 2rem 3rem;
      border-top: 0.5px solid rgba(26,23,20,0.12);
    }

    footer a {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--ink); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">STN</a>
    <div class="nav-links">
      <a href="about.html">About</a>
    </div>
  </nav>

  <div class="page-header">
    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <span>For Actors, By Actors</span>
      <div class="eyebrow-line"></div>
    </div>
    <h1>Schedule a Session</h1>
    <p class="subhead">30 min · Google Meet · $25</p>
    <div class="divider"></div>
  </div>

  <div class="calendly-wrap">
    <div
      class="calendly-inline-widget"
      data-url="https://calendly.com/thebrianandrus/30min?hide_landing_page_details=1&hide_gdpr_banner=1&background_color=f7f4ef&text_color=1a1714&primary_color=b5863a"
    ></div>
  </div>

  <footer>
    <a href="about.html">About</a>
  </footer>

  <script src="https://assets.calendly.com/assets/external/widget.js" async></script>

</body>
</html>
