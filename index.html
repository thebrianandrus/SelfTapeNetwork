<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Tape Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f7f4ef;
      --ink: #1a1714;
      --muted: #7a7470;
      --accent: #b5863a;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* subtle film grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.5;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      border-bottom: 0.5px solid rgba(26,23,20,0.12);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--ink); }

    .nav-cta {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 22px;
      border: 0.5px solid var(--ink);
      color: var(--ink);
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .nav-cta:hover {
      background: var(--ink);
      color: var(--cream);
    }

    /* HERO */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5rem 2rem 4rem;
      position: relative;
    }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    .hero-eyebrow span {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-line {
      width: 32px;
      height: 0.5px;
      background: var(--muted);
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(56px, 10vw, 108px);
      font-weight: 300;
      font-style: italic;
      line-height: 1.05;
      color: var(--ink);
      letter-spacing: 4px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.25s;
    }

    .hero-tagline {
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1.75rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.45s;
    }

    .hero-divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      margin: 2.5rem auto;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.6s;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.75s;
    }

    .btn-primary {
      display: inline-block;
      padding: 14px 36px;
      background: var(--ink);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.8; }

    .btn-outline {
      display: inline-block;
      padding: 14px 36px;
      border: 0.5px solid rgba(26,23,20,0.4);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-outline:hover {
      border-color: var(--ink);
      background: rgba(26,23,20,0.04);
    }

    /* FOOTER NAV */
    .footer-nav {
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 2rem 3rem;
      border-top: 0.5px solid rgba(26,23,20,0.12);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.9s;
    }

    .footer-nav a {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-nav a:hover { color: var(--ink); }

    /* decorative corner marks */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      opacity: 0.18;
    }
    .corner-tl { top: 2rem; left: 2rem; border-top: 1px solid var(--ink); border-left: 1px solid var(--ink); }
    .corner-tr { top: 2rem; right: 2rem; border-top: 1px solid var(--ink); border-right: 1px solid var(--ink); }
    .corner-bl { bottom: 2rem; left: 2rem; border-bottom: 1px solid var(--ink); border-left: 1px solid var(--ink); }
    .corner-br { bottom: 2rem; right: 2rem; border-bottom: 1px solid var(--ink); border-right: 1px solid var(--ink); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">STN</a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
    </ul>

  </nav>

  <main class="hero">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="hero-eyebrow">
      <div class="hero-line"></div>
      <span>For Actors, By Actors</span>
      <div class="hero-line"></div>
    </div>

    <h1 class="hero-title">Self Tape Network</h1>

    <div class="hero-divider"></div>

    <div class="hero-actions">
      <a href="schedule.html" class="btn-primary">Schedule a Self Tape Session</a>
    </div>
  </main>

  <footer class="footer-nav">
    <a href="about.html">About</a>
  </footer>

</body>
</html>
